<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Material al Curso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #23272f;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            color: #a1db87;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            color: #a1db87;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #a1db87;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #1a1a1a;
            border: 2px dashed #a1db87;
            border-radius: 8px;
            color: #a1db87;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .file-input-label:hover {
            background: #252525;
            border-color: #5ec6a6;
        }
        
        .file-name {
            color: #fff;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #a1db87 0%, #5ec6a6 100%);
            border: none;
            border-radius: 10px;
            color: #1a1a1a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(161, 219, 135, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
        }
        
        .message.success {
            background: #a1db87;
            color: #1a1a1a;
        }
        
        .message.error {
            background: #ff6b6b;
            color: #fff;
        }
        
        .help-text {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .step {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #a1db87;
        }
        
        .step-number {
            color: #a1db87;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Subir Material al Curso</h1>
        <p class="subtitle">Agrega temas y materiales PDF a tus cursos</p>
        
        <div class="step">
            <div class="step-number">Paso 1: Crear Tema</div>
            <form id="temaForm">
                <div class="form-group">
                    <label>ID del Curso *</label>
                    <input type="text" id="courseId" required placeholder="Ej: 507f1f77bcf86cd799439011">
                    <div class="help-text">Lo encuentras en la URL del curso</div>
                </div>
                
                <div class="form-group">
                    <label>Número de Tema *</label>
                    <input type="number" id="numeroTema" value="1" required min="1">
                </div>
                
                <div class="form-group">
                    <label>Título del Tema *</label>
                    <input type="text" id="tituloTema" required placeholder="Ej: Introducción al Curso">
                </div>
                
                <div class="form-group">
                    <label>Descripción del Tema</label>
                    <textarea id="descripcionTema" placeholder="Describe de qué trata este tema..."></textarea>
                </div>
                
                <button type="submit" class="btn" id="btnCrearTema">Crear Tema</button>
            </form>
        </div>
        
        <div class="step" id="step2" style="display: none;">
            <div class="step-number">Paso 2: Subir Material PDF</div>
            <form id="materialForm">
                <input type="hidden" id="temaId">
                
                <div class="form-group">
                    <label>Título del Material *</label>
                    <input type="text" id="tituloMaterial" required placeholder="Ej: Material de Estudio - Tema 1">
                </div>
                
                <div class="form-group">
                    <label>Descripción del Material</label>
                    <textarea id="descripcionMaterial" placeholder="Describe el contenido del material..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Archivo PDF *</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="pdfFile" accept=".pdf" required>
                        <label for="pdfFile" class="file-input-label">
                            📄 Seleccionar archivo PDF
                        </label>
                    </div>
                    <div class="file-name" id="fileName"></div>
                </div>
                
                <button type="submit" class="btn" id="btnSubirMaterial">Subir Material</button>
            </form>
        </div>
        
        <div id="message"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8547/api';
        
        // Manejar cambio de archivo
        document.getElementById('pdfFile').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileName').textContent = fileName || 'Ningún archivo seleccionado';
        });
        
        // Paso 1: Crear tema
        document.getElementById('temaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const courseId = document.getElementById('courseId').value;
            const numeroTema = parseInt(document.getElementById('numeroTema').value);
            const titulo = document.getElementById('tituloTema').value;
            const descripcion = document.getElementById('descripcionTema').value;
            
            const btn = document.getElementById('btnCrearTema');
            btn.disabled = true;
            btn.textContent = 'Creando...';
            
            try {
                const response = await fetch(`${API_URL}/courses/${courseId}/temas`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        numeroTema,
                        titulo,
                        descripcion
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.mensaje || errorData.error || 'Error al crear el tema');
                }
                
                const data = await response.json();
                const temaId = data.temas[data.temas.length - 1]._id;
                
                document.getElementById('temaId').value = temaId;
                document.getElementById('step2').style.display = 'block';
                
                showMessage('✓ Tema creado exitosamente. Ahora sube el material PDF.', 'success');
                btn.textContent = '✓ Tema Creado';
                
            } catch (error) {
                showMessage(error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Crear Tema';
            }
        });
        
        // Paso 2: Subir material
        document.getElementById('materialForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const courseId = document.getElementById('courseId').value;
            const temaId = document.getElementById('temaId').value;
            const titulo = document.getElementById('tituloMaterial').value;
            const descripcion = document.getElementById('descripcionMaterial').value;
            const file = document.getElementById('pdfFile').files[0];
            
            if (!file) {
                showMessage('Por favor selecciona un archivo PDF', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('archivo', file);
            formData.append('tipo', 'pdf');
            formData.append('titulo', titulo);
            formData.append('descripcion', descripcion);
            formData.append('orden', '1');
            
            const btn = document.getElementById('btnSubirMaterial');
            btn.disabled = true;
            btn.textContent = 'Subiendo...';
            
            try {
                const response = await fetch(`${API_URL}/courses/${courseId}/temas/${temaId}/materiales`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.mensaje || errorData.error || 'Error al subir el material');
                }
                
                showMessage('✓ Material subido exitosamente. Recarga la página del curso para verlo.', 'success');
                btn.textContent = '✓ Material Subido';
                
                // Resetear formulario después de 2 segundos
                setTimeout(() => {
                    location.reload();
                }, 2000);
                
            } catch (error) {
                showMessage(error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Subir Material';
            }
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
